<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Nouveau produit')}"></head>
<body>
<div th:replace="~{layout :: layout('Nouveau produit', ~{::content})}">
    <div th:fragment="content">
        <h2>Ajouter un produit</h2>
        <form method="post" th:action="@{/saveProduct}" th:object="${product}">
            <div class="mb-3">
                <label class="form-label">Nom</label>
                <input type="text" class="form-control" th:field="*{name}">
                <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" th:field="*{description}"></textarea>
                <div class="text-danger" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Prix</label>
                <input type="number" step="0.01" class="form-control" th:field="*{price}">
                <div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Quantite</label>
                <input type="number" class="form-control" th:field="*{quantity}">
                <div class="text-danger" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
            </div>
            <button type="submit" class="btn btn-primary">Enregistrer</button>
            <a href="/" class="btn btn-secondary">Annuler</a>
        </form>
    </div>
</div>
</body>
</html>
