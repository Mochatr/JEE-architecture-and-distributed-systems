<h2>Ajouter un produit</h2>

<div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>

<form #productForm="ngForm" (ngSubmit)="onSubmit(productForm)" novalidate>
  <div class="mb-3">
    <label class="form-label">Nom</label>
    <input type="text" class="form-control" name="name" required minlength="3"
           [(ngModel)]="product.name" #name="ngModel">
    <div class="text-danger" *ngIf="name.invalid && name.touched">
      Le nom doit contenir au moins 3 caracteres.
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">Description</label>
    <textarea class="form-control" name="description" required
              [(ngModel)]="product.description" #description="ngModel"></textarea>
    <div class="text-danger" *ngIf="description.invalid && description.touched">
      La description est obligatoire.
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">Prix</label>
    <input type="number" class="form-control" name="price" required min="0"
           [(ngModel)]="product.price" #price="ngModel">
    <div class="text-danger" *ngIf="price.invalid && price.touched">
      Le prix doit etre positif.
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">Quantite</label>
    <input type="number" class="form-control" name="quantity" required min="0"
           [(ngModel)]="product.quantity" #quantity="ngModel">
    <div class="text-danger" *ngIf="quantity.invalid && quantity.touched">
      La quantite doit etre positive.
    </div>
  </div>

  <button type="submit" class="btn btn-primary" [disabled]="productForm.invalid">Enregistrer</button>
</form>
