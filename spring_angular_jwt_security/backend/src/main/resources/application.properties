spring.application.name=ebank-backend
server.port=8085

spring.datasource.url=jdbc:h2:mem:ebank-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

springdoc.swagger-ui.path=/swagger-ui.html

jwt.secret=${JWT_SECRET:dev-only-secret-key-do-not-use-in-production-32bytes-min}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:llama-3.3-70b-versatile}
openai.base-url=${OPENAI_BASE_URL:https://api.groq.com/openai/v1}
