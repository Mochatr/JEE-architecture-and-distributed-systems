<div class="container mt-4" style="max-width: 450px;">
  <h2>Changer le mot de passe</h2>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
  <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="mb-3">
      <label class="form-label">Mot de passe actuel</label>
      <input type="password" class="form-control" formControlName="currentPassword">
    </div>
    <div class="mb-3">
      <label class="form-label">Nouveau mot de passe</label>
      <input type="password" class="form-control" formControlName="newPassword">
      <div class="text-danger" *ngIf="form.get('newPassword')?.invalid && form.get('newPassword')?.touched">
        Au moins 6 caractères.
      </div>
    </div>
    <button type="submit" class="btn btn-primary" [disabled]="form.invalid">Enregistrer</button>
  </form>
</div>
