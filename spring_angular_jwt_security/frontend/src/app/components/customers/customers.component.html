<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Clients</h2>
    <a routerLink="/customers/new" class="btn btn-primary">+ Nouveau client</a>
  </div>

  <div class="input-group mb-3">
    <input type="text" class="form-control" placeholder="Rechercher un client..."
           [(ngModel)]="keyword" (keyup.enter)="search()">
    <button class="btn btn-outline-secondary" (click)="search()">Rechercher</button>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <table class="table table-striped table-hover">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Email</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let customer of customers">
        <td>{{ customer.id }}</td>
        <td>{{ customer.name }}</td>
        <td>{{ customer.email }}</td>
        <td>
          <a [routerLink]="['/customers', customer.id, 'accounts']" class="btn btn-sm btn-info me-2">Comptes</a>
          <button class="btn btn-sm btn-danger" (click)="deleteCustomer(customer)">Supprimer</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
