<div class="container mt-4" style="max-width: 500px;">
  <h2>Nouveau client</h2>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="mb-3">
      <label class="form-label">Nom</label>
      <input type="text" class="form-control" formControlName="name">
      <div class="text-danger" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
        Le nom est obligatoire.
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" formControlName="email">
      <div class="text-danger" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
        Un email valide est obligatoire.
      </div>
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="form.invalid">Enregistrer</button>
  </form>
</div>
